services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: digitalwallet-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/wallet/balance"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - digitalwallet
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: digitalwallet-client
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - digitalwallet
    restart: unless-stopped

networks:
  digitalwallet:
    driver: bridge
