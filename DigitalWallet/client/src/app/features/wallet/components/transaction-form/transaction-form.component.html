<div class="card">
  <h2>Registrar transacción</h2>
  <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="amount">Monto</label>
      <input id="amount" type="number" formControlName="amount" placeholder="0.00" step="0.01" />
      <span *ngIf="transactionForm.get('amount')?.hasError('required') && transactionForm.get('amount')?.touched">El monto es obligatorio.</span>
      <span *ngIf="transactionForm.get('amount')?.hasError('min')">El monto debe ser mayor a 0.01.</span>
      <span *ngIf="transactionForm.get('amount')?.hasError('max')">El monto es demasiado alto.</span>
    </div>

    <div class="field">
      <label for="type">Tipo</label>
      <select id="type" formControlName="type">
        <option value="Deposit">Depósito</option>
        <option value="Withdrawal">Retiro</option>
      </select>
    </div>

    <div class="field">
      <label for="description">Descripción</label>
      <textarea id="description" rows="3" formControlName="description" placeholder="Ej. Pago recibo"></textarea>
      <span *ngIf="transactionForm.get('description')?.hasError('required') && transactionForm.get('description')?.touched">La descripción es obligatoria.</span>
    </div>

    <button class="button-primary" type="submit" [disabled]="transactionForm.invalid">Enviar transacción</button>
  </form>
</div>
